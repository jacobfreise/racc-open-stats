<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Team Theorycrafter</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="app-header">
        <h1>Racc Open <span class="highlight">Theorycrafter</span></h1>
        <div class="header-decoration"></div>
    </header>

    <a href="index.html" class="back-link">← Back to Main Dashboard</a>
    
    <div style="display: none;">
        <select id="seasonSelector" onchange="switchSeason()">
            <option value="s2" selected>Season 2</option>
        </select>
    </div>

    <div class="controls" style="justify-content: flex-end;">
        <div class="control-group">
            <label>Theme</label>
            <div class="select-wrapper">
                <select id="themeSelector" onchange="switchTheme()">
                <option value="">Default (Dark)</option>
                <option value="ram">Ram (Pink)</option>
                <option value="rem">Rem (Blue)</option>
                <option value="oguri">Oguri Cap (Ice Blue)</option>
                <option value="coffee">Coffee (Brown)</option>
                <option value="nice-nature">Nice Nature (Green/Red)</option>
                <option value="miku">Miku (Teal)</option>
                <option value="teto">Teto (Red)</option>
                <option value="macchiato">Macchiato (Purple)</option>
                <option value="hina">Hina (Violet)</option>
                <option value="manga">Manga (B&W)</option>
                <option value="succubus">Succubus (Dark/Pink)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="view-section active">
        <div class="card table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; padding: 0 10px;">
                <h2 style="margin: 0;">TRAINER PRESETS</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    
                    <button id="autoDraftBtn" onclick="generateAutoDraft()" class="copy-btn" style="background: var(--accent-color); color: var(--bg-color); border: none; font-weight: bold; cursor: pointer;">
                        ✨ Calculate Draft
                    </button>

                    <label style="margin: 0;">Target Trainer:</label>
                    <div class="select-wrapper" style="min-width: 200px;">
                        <select id="tcrafTrainerSelector" onchange="generateTheorycraft()"></select>
                    </div>
                </div>
            </div>
            
            <div id="tcraf-results" style="padding: 10px;">
                </div>
        </div>
            
            <div id="tcraf-results" style="padding: 10px;">
                </div>
        </div>

        <div class="card table-card" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; padding: 0 10px;">
                <h2 style="margin: 0;">CUSTOM TEAM SIMULATOR</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <label style="margin: 0;">Simulate By:</label>
                    <div class="select-wrapper">
                        <select id="simTypeSelector" onchange="populateSimDropdowns()">
                            <option value="trainer">Trainers</option>
                            <option value="uma">Umas</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: space-evenly; flex-wrap: wrap; margin-bottom: 20px; padding: 0 10px;">
                <div class="select-wrapper" style="flex: 1; min-width: 150px;">
                    <select id="simSlot1" onchange="runSimulation()"></select>
                </div>
                <div class="select-wrapper" style="flex: 1; min-width: 150px;">
                    <select id="simSlot2" onchange="runSimulation()"></select>
                </div>
                <div class="select-wrapper" style="flex: 1; min-width: 150px;">
                    <select id="simSlot3" onchange="runSimulation()"></select>
                </div>
            </div>

            <div id="sim-results" style="padding: 10px;">
                </div>
        </div>
    </div>

</div>

<script src="data.js"></script>
<script src="data_s2.js"></script>
<script src="box_data.js"></script>
<script src="release_data.js"></script>
<script src="script.js"></script>
<script type="module" src="dataFetch.js"></script>

</body>
</html>
